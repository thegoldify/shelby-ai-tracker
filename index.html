<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldify | Shelby AI Tracker</title>
    <style>
        :root {
            --gold: #ffd700;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-gray: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .header h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .header p {
            color: var(--text-gray);
            font-size: 1rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .stat-card h3 {
            color: var(--text-gray);
            font-size: 0.8rem;
            margin: 0 0 10px 0;
        }

        .stat-card div {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }

        .peer-table-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #333;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: "📡";
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--text-gray);
            font-size: 0.9rem;
            padding: 15px 10px;
            border-bottom: 2px solid #333;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #222;
            font-size: 0.95rem;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff00;
