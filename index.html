<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelby AI Network Dashboard | goldify</title>
    <style>
        body { margin: 0; padding: 0; background: #010409; color: #c9d1d9; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }
        #network-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-serif: -1; opacity: 0.2; }
        .container { max-width: 850px; margin: 80px auto; padding: 30px; border: 1px solid #30363d; border-radius: 12px; background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { border-bottom: 2px solid #58a6ff; padding-bottom: 15px; color: #58a6ff; font-weight: 800; font-size: 2.5em; text-transform: uppercase; letter-spacing: 1px; }
        .operator-info { margin-top: -10px; color: #8b949e; font-size: 0.9em; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { padding: 20px; border: 1px solid #30363d; border-radius: 8px; background: #1c2128; text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(88, 166, 255, 0.2); }
        .stat-card h3 { color: #8b949e; font-size: 0.85em; text-transform: uppercase; margin-bottom: 10px; }
        .stat-value { color: #ffffff; font-size: 1.8em; font-weight: 700; }
        .status-online { color: #3fb950; font-weight: bold; }
        .official-btn { display: inline-block; margin-top: 40px; padding: 12px 24px; color: #ffffff; background-color: #238636; border-radius: 6px; text-decoration: none; font-weight: 600; transition: background-color 0.2s; }
        .official-btn:hover { background-color: #2ea043; }
    </style>
</head>
<body>
    <canvas id="network-bg"></canvas>
    <div class="container">
        <h1 class="header">Shelby AI Node Monitor</h1>
        <div class="operator-info">Operator: <strong>goldify</strong> | Region: <strong>Turkey</strong> | Network: Shelby Testnet</div>
        <div class="stat-grid">
            <div class="stat-card"><h3>Network Status</h3><p class="stat-value status-online">● Active</p></div>
            <div class="stat-card"><h3>Sync Speed</h3><p class="stat-value">98 ms</p></div>
            <div class="stat-card"><h3>AI Processing</h3><p class="stat-value">91.4%</p></div>
            <div class="stat-card"><h3>Active Peers</h3><p class="stat-value">61</p></div>
            <div class="stat-card"><h3>Uptime</h3><p class="stat-value">99.98%</p></div>
            <div class="stat-card"><h3>Node Version</h3><p class="stat-value">v1.2.0</p></div>
        </div>
        <div style="text-align: center;">
            <a href="https://shelby.tech" target="_blank" class="official-btn">Official Shelby Website</a>
        </div>
    </div>
    <script>
        // Basit bir hareketli ağ efekti
        const canvas = document.getElementById('network-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        for (let i = 0; i < 100; i++) { particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, radius: Math.random() * 2 + 1, vx: Math.random() * 1 - 0.5, vy: Math.random() * 1 - 0.5 }); }
        function draw() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#58a6ff'; ctx.beginPath(); for (let i = 0; i < 100; i++) { let p = particles[i]; ctx.moveTo(p.x, p.y); ctx.arc(p.x, p.y, p.radius, 0, Math.random()*2*Math.PI); p.x += p.vx; p.y += p.vy; if(p.x<0||p.x>canvas.width)p.vx=-p.vx; if(p.y<0||p.y>canvas.height)p.vy=-p.vy; } ctx.fill(); requestAnimationFrame(draw); }
        draw();
    </script>
</body>
</html>
