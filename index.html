<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Shelby AI - Peer Analizi</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 10px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #00ffcc; border-bottom: 2px solid #00ffcc; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
        th { color: #00ffcc; }
        .status-good { color: #00ff00; font-weight: bold; }
        .status-slow { color: #ffcc00; }
    </style>
</head>
<body>

<div class="card">
    <h1>📡 Shelby Node: Peer Analizi</h1>
    <p>Şu an bağlı olduğun diğer düğümlerin (peer) listesi aşağıdadır:</p>
    
    <table>
        <thead>
            <tr>
                <th>Peer Adresi (IP)</th>
                <th>Konum / Ülke</th>
                <th>Hız (Gecikme)</th>
                <th>Durum</th>
            </tr>
        </thead>
        <tbody id="peer-list">
            <tr>
                <td>185.122.XX.XX</td>
                <td>🇹🇷 Türkiye (İstanbul)</td>
                <td>24ms</td>
                <td><span class="status-good">● Mükemmel</span></td>
            </tr>
            <tr>
                <td>95.217.XX.XX</td>
                <td>🇩🇪 Almanya (Helsinki)</td>
                <td>48ms</td>
                <td><span class="status-good">● Stabil</span></td>
            </tr>
            <tr>
                <td>144.76.XX.XX</td>
                <td>🇺🇸 ABD (New York)</td>
                <td>160ms</td>
                <td><span class="status-slow">● Gecikmeli</span></td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
