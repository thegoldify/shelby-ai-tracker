<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldify | Shelby Ecosystem Tracker</title>
    <style>
        :root { --gold: #ffd700; --dark: #0a0a0a; --card: #141414; --gray: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; padding: 30px; border: 1px solid var(--gold); border-radius: 20px; margin-bottom: 30px; background: linear-gradient(145deg, #141414, #0a0a0a); }
        .header h1 { color: var(--gold); margin: 0; letter-spacing: 8px; font-size: 2.5rem; text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-card h3 { color: var(--gray); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card div { color: var(--gold); font-size: 1.8rem; font-weight: bold; }
        .monitor-section { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid #222; margin-bottom: 20px; }
        .log-screen { background: #000; color: #00ff00; font-family: 'Monaco', monospace; padding: 15px; border-radius: 10px; height: 120px; font-size: 0.8rem; border: 1px solid #333; overflow: hidden; line-height: 1.5; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: var(--gold); font-size: 0.8rem; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
        .badge { background: rgba(255,215,0,0.1); color: var(--gold); padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; border: 1px solid rgba(255,215,0,0.2); }
        .footer { text-align: center; margin-top: 40px; color: var(--gray); font-size: 0.8rem; }
        .social { margin-top: 10px; }
        .social a { color: var(--gold); text-decoration: none; margin: 0 10px; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .social a:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

            <h1>SHELBY ANALYTICS</h1>
            <p style="color: var(--gray);">Node Operator Intelligence by Goldify</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><h3>AĞ VERSİYONU</h3><div>v4.0.2-Testnet</div></div>

            <div class="stat-card"><h3>BLOK HIZI</h3><div>1.2s</div></div>
        </div>

        <div class="monitor-section">
            <h2 style="font-size: 1.1rem; margin-top: 0; color: var(--gold);">📡 Shelby Peer Map</h2>
