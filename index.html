<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shelby AI Network Dashboard</title>
    <style>
        body { background: #0b0e14; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 800px; margin: 50px auto; padding: 20px; border: 1px solid #30363d; border-radius: 10px; background: #161b22; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { padding: 15px; border: 1px solid #30363d; border-radius: 6px; text-align: center; }
        .status-online { color: #3fb950; font-weight: bold; }
        .header { border-bottom: 1px solid #30363d; padding-bottom: 10px; color: #58a6ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header">Shelby AI Node Monitor</h1>
        <p>Operator: <strong>goldify</strong> | Location: <strong>Turkey</strong></p>
        <div class="stat-grid">
            <div class="stat-card">
                <h3>Network Status</h3>
                <p class="status-online">● Online</p>
            </div>
            <div class="stat-card">
                <h3>Sync Speed</h3>
                <p>124 ms</p>
            </div>
            <div class="stat-card">
                <h3>AI Processing</h3>
                <p>94.2% Load</p>
            </div>
            <div class="stat-card">
                <h3>Active Peers</h3>
                <p>42 connected</p>
            </div>
        </div>
    </div>
</body>
</html>
